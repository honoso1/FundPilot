spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fundpilot}
    username: ${DB_USER:fundpilot}
    password: ${DB_PASSWORD:fundpilot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  seed-demo: ${APP_SEED_DEMO:true}
  scoring:
    strong-buy-threshold: ${SCORING_STRONG_BUY_THRESHOLD:80}
    buy-threshold: ${SCORING_BUY_THRESHOLD:65}
    hold-threshold: ${SCORING_HOLD_THRESHOLD:45}
    weight-return1y: ${SCORING_WEIGHT_RETURN1Y:0.35}
    weight-ma: ${SCORING_WEIGHT_MA:0.25}
    weight-percentile: ${SCORING_WEIGHT_PERCENTILE:0.15}
    weight-drawdown: ${SCORING_WEIGHT_DRAWDOWN:0.15}
    weight-benchmark: ${SCORING_WEIGHT_BENCHMARK:0.10}

logging:
  pattern:
    level: "%5p [%X{requestId:-n/a}]"

server:
  port: 8080
