services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fundpilot
      POSTGRES_USER: fundpilot
      POSTGRES_PASSWORD: fundpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/fundpilot
      DB_USER: fundpilot
      DB_PASSWORD: fundpilot
      app.seed-demo: "true"
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
