<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FundPilot MVP</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>FundPilot</h1>
    <button id="importMockBtn">Import Mock Data</button>
  </header>
  <main>
    <section>
      <h2>Funds</h2>
      <table id="fundTable">
        <thead><tr><th>Code</th><th>Name</th><th>Latest NAV</th><th>Score</th><th>Signal</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
    <section id="fundDetailSection" class="hidden">
      <h2>Fund Detail</h2>
      <div id="fundDetail"></div>
      <h3>Latest Signal</h3>
      <div id="latestSignal"></div>
      <h3>NAV History (simple chart)</h3>
      <canvas id="navChart" width="800" height="280"></canvas>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
